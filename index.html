<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menù del giorno – Hotel Embassy</title>
<meta name="description" content="Crea e stampa il menù giornaliero dell'hotel.">
<meta name="theme-color" content="#11131a">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" type="image/png" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Menù">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=EB+Garamond:ital@0;1&family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400&family=Lora:ital@0;1&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;1,9..144,400&family=Karla:wght@300;400;500;600&family=Bodoni+Moda:ital,opsz,wght@0,6..96,500;0,6..96,600;1,6..96,400&family=Spectral:ital,wght@0,300;0,400;0,500;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ui-bg:#11131a;
    --ui-panel:#1a1d27;
    --ui-panel-2:#212533;
    --ui-line:#2e3344;
    --ui-text:#e7e9f0;
    --ui-dim:#9aa0b4;
    --ui-accent:#c9a14a;
    --ui-accent-2:#5a8a9a;
    --ui-danger:#b65454;
    --radius:12px;
    --topbar:48px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:'Inter',system-ui,sans-serif;
    background:var(--ui-bg);
    color:var(--ui-text);
    -webkit-font-smoothing:antialiased;
  }
  .view:not(.active){display:none !important}
  .app{
    display:grid;
    grid-template-columns:380px 1fr;
    min-height:calc(100vh - var(--topbar));
  }
  /* ---------- EDITOR ---------- */
  .editor{
    background:var(--ui-panel);
    border-right:1px solid var(--ui-line);
    padding:22px 20px 60px;
    overflow-y:auto;
    height:calc(100vh - var(--topbar));
  }
  .brand{
    display:flex;align-items:baseline;gap:10px;margin-bottom:4px;
  }
  .brand h1{font-size:18px;font-weight:700;margin:0;letter-spacing:-.01em}
  .brand .dot{width:8px;height:8px;border-radius:50%;background:var(--ui-accent)}
  .brand-logo{height:26px;width:auto;display:block}
  .brand-sub{color:var(--ui-dim);font-size:12.5px;margin:0 0 22px}
  .field{margin-bottom:14px}
  .field-row{display:flex;gap:12px}
  .field-row .field{flex:1;min-width:0}
  .field label{display:block;font-size:12px;color:var(--ui-dim);margin-bottom:6px;font-weight:500}
  .field input[type=text],.field input[type=date]{
    width:100%;padding:9px 11px;border-radius:8px;border:1px solid var(--ui-line);
    background:var(--ui-panel-2);color:var(--ui-text);font-size:13.5px;font-family:inherit;
  }
  .field input:focus{outline:none;border-color:var(--ui-accent-2)}
  .meal-block{
    background:var(--ui-panel-2);border:1px solid var(--ui-line);border-radius:var(--radius);
    padding:14px;margin-bottom:14px;
  }
  .meal-block > h2{
    font-size:13px;text-transform:uppercase;letter-spacing:.12em;margin:0 0 12px;
    color:var(--ui-accent);font-weight:600;
  }
  .course{margin-bottom:12px}
  .course-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
  .course-head .name{font-size:12px;color:var(--ui-dim);font-weight:600}
  .course-head .add{
    background:none;border:1px solid var(--ui-line);color:var(--ui-text);
    width:24px;height:24px;border-radius:6px;cursor:pointer;font-size:15px;line-height:1;
    display:flex;align-items:center;justify-content:center;transition:.15s;
  }
  .course-head .add:hover{border-color:var(--ui-accent-2);color:var(--ui-accent-2)}
  .course-head .add:disabled{opacity:.3;cursor:not-allowed}
  .row{display:flex;gap:6px;margin-bottom:6px}
  .row input{
    flex:1;padding:8px 10px;border-radius:7px;border:1px solid var(--ui-line);
    background:var(--ui-panel);color:var(--ui-text);font-size:13px;font-family:inherit;
  }
  .row input:focus{outline:none;border-color:var(--ui-accent-2)}
  .row .del{
    background:none;border:1px solid var(--ui-line);color:var(--ui-dim);
    width:34px;border-radius:7px;cursor:pointer;font-size:14px;transition:.15s;flex:none;
  }
  .row .del:hover{border-color:var(--ui-danger);color:var(--ui-danger)}
  .row .del:disabled{opacity:.25;cursor:not-allowed}

  .templates{margin:6px 0 18px}
  .templates > .lbl{font-size:12px;color:var(--ui-dim);margin-bottom:9px;font-weight:500}
  .tpl-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .tpl-card{
    border:1.5px solid var(--ui-line);border-radius:10px;padding:5px;cursor:pointer;
    background:var(--ui-panel-2);transition:.15s;text-align:center;
  }
  .tpl-card:hover{border-color:var(--ui-accent-2)}
  .tpl-card.active{border-color:var(--ui-accent);box-shadow:0 0 0 2px rgba(201,161,74,.18)}
  .tpl-thumb{
    width:100%;aspect-ratio:210/297;border-radius:5px;overflow:hidden;background:#fff;
    position:relative;
  }
  .tpl-thumb .scaler{position:absolute;top:0;left:0;transform-origin:top left}
  .tpl-card .tname{font-size:11px;color:var(--ui-dim);margin-top:5px;font-weight:500}
  .tpl-card.active .tname{color:var(--ui-text)}

  .actions{display:flex;gap:10px;margin-top:8px}
  .btn{
    flex:1;padding:12px;border-radius:9px;border:none;cursor:pointer;font-size:13.5px;
    font-weight:600;font-family:inherit;transition:.15s;letter-spacing:.02em;
  }
  .btn-primary{background:var(--ui-accent);color:#1a1406}
  .btn-primary:hover{filter:brightness(1.07)}
  .btn-ghost{background:var(--ui-panel-2);color:var(--ui-text);border:1px solid var(--ui-line)}
  .btn-ghost:hover{border-color:var(--ui-accent-2)}

  /* ---------- PREVIEW ---------- */
  .stage{
    padding:34px;display:flex;align-items:flex-start;justify-content:center;
    background:radial-gradient(120% 80% at 50% 0%,#171a24 0%,#0d0e14 100%);
    overflow:auto;height:calc(100vh - var(--topbar));
  }
  .stage-inner{transform-origin:top center}
  .sheet-shadow{box-shadow:0 24px 70px rgba(0,0,0,.55);border-radius:2px}

  /* ============ MENU SHEET (shared) ============ */
  .sheet{
    width:210mm;min-height:297mm;background:#fff;color:#1c1c1c;
    padding:20mm 18mm;position:relative;display:flex;flex-direction:column;
  }
  .sheet-head{text-align:center;position:relative;z-index:2}
  .hotel{margin:0}
  .menu-date{margin:0}
  .meals{
    display:flex;flex-direction:column;flex:1;justify-content:center;
    margin-top:9mm;position:relative;z-index:2;
  }
  .meal-title{text-align:center;margin:0 0 6mm}
  .courses{display:flex;justify-content:space-around;align-items:flex-start;gap:9mm}
  .course{flex:1;max-width:62mm;text-align:center}
  .course h3{text-align:center;margin:0 0 3.5mm}
  .course ul{list-style:none;margin:0;padding:0;text-align:center}
  .course li{margin:0 0 3.4mm;line-height:1.3}
  .meal-divider{margin:10mm auto;width:55mm}
  .sheet-foot{text-align:center;margin-top:9mm;position:relative;z-index:2}

  /* ---------- Template: Marina ---------- */
  .tpl-marina{
    --c-ink:#16323f;--c-soft:#4a6b76;--c-brass:#a98549;--c-bg:#fbfaf6;
    background:var(--c-bg);
    font-family:'EB Garamond',serif;color:var(--c-ink);
  }
  .tpl-marina::before{
    content:"";position:absolute;inset:7mm;border:1.5px solid var(--c-brass);
    border-radius:1px;opacity:.55;pointer-events:none;
  }
  .tpl-marina::after{
    content:"";position:absolute;inset:8.6mm;border:.6px solid var(--c-soft);
    opacity:.4;pointer-events:none;
  }
  .tpl-marina .hotel{
    font-family:'Cormorant Garamond',serif;font-weight:600;font-size:13pt;
    letter-spacing:.42em;text-transform:uppercase;color:var(--c-soft);
    padding-left:.42em;
  }
  .tpl-marina .menu-date{
    font-family:'Cormorant Garamond',serif;font-size:30pt;font-weight:500;margin-top:3mm;
  }
  .tpl-marina .head-wave{display:block;margin:4mm auto 0;width:42mm;height:4.2mm;color:var(--c-brass)}
  .tpl-marina .meal-title{
    font-family:'Cormorant Garamond',serif;font-weight:600;font-size:24pt;
    letter-spacing:.06em;
  }
  .tpl-marina .meal-title::after{
    content:"";display:block;width:16mm;height:1px;background:var(--c-brass);
    margin:2.6mm auto 0;opacity:.7;
  }
  .tpl-marina .course h3{
    font-family:'Cormorant Garamond',serif;font-size:13pt;font-weight:600;
    text-transform:uppercase;letter-spacing:.24em;color:var(--c-soft);padding-left:.24em;
  }
  .tpl-marina .course li{font-size:16.5pt}
  .tpl-marina .meal-divider{height:1px;background:linear-gradient(to right,transparent,var(--c-brass),transparent);opacity:.55}
  .tpl-marina .sheet-foot{
    font-family:'Cormorant Garamond',serif;font-style:italic;font-size:15pt;color:var(--c-soft);
  }

  /* ---------- Template: Tavola ---------- */
  .tpl-tavola{
    --c-ink:#2a2522;--c-wine:#6e2230;--c-gold:#b48a3c;--c-bg:#faf5ec;
    background:
      radial-gradient(60mm 60mm at 0% 0%,rgba(180,138,60,.06),transparent),
      radial-gradient(60mm 60mm at 100% 100%,rgba(110,34,48,.05),transparent),
      var(--c-bg);
    font-family:'Lora',serif;color:var(--c-ink);
  }
  .tpl-tavola::before{
    content:"";position:absolute;inset:9mm;border:2.4px double var(--c-wine);
    pointer-events:none;opacity:.7;
  }
  .tpl-tavola .hotel{
    font-family:'Playfair Display',serif;font-weight:700;font-size:12pt;
    letter-spacing:.3em;text-transform:uppercase;color:var(--c-wine);padding-left:.3em;
  }
  .tpl-tavola .menu-date{
    font-family:'Playfair Display',serif;font-size:31pt;font-weight:700;margin-top:2mm;
    color:var(--c-ink);
  }
  .tpl-tavola .head-flourish{display:block;margin:3.5mm auto 0;width:36mm;height:4.8mm;color:var(--c-gold)}
  .tpl-tavola .meal-title{
    font-family:'Playfair Display',serif;font-weight:700;font-size:23pt;color:var(--c-wine);
  }
  .tpl-tavola .meal-title::before,.tpl-tavola .meal-title::after{content:"\2766";color:var(--c-gold);font-size:14pt;margin:0 4mm;vertical-align:middle}
  .tpl-tavola .course h3{
    font-family:'Playfair Display',serif;font-size:13pt;font-weight:700;font-style:italic;
    color:var(--c-gold);letter-spacing:.04em;
  }
  .tpl-tavola .course li{font-size:15.5pt}
  .tpl-tavola .meal-divider{height:1px;background:var(--c-gold);opacity:.5}
  .tpl-tavola .sheet-foot{
    font-family:'Playfair Display',serif;font-style:italic;font-size:15pt;color:var(--c-wine);
  }

  /* ---------- Template: Orto ---------- */
  .tpl-orto{
    --c-ink:#2d3329;--c-sage:#52613f;--c-ochre:#9c7a33;--c-bg:#fcfbf6;
    background:var(--c-bg);
    font-family:'Karla',sans-serif;color:var(--c-ink);
  }
  .tpl-orto .hotel{
    font-family:'Karla',sans-serif;font-weight:600;font-size:10.5pt;
    letter-spacing:.34em;text-transform:uppercase;color:var(--c-sage);padding-left:.34em;
  }
  .tpl-orto .menu-date{
    font-family:'Fraunces',serif;font-size:32pt;font-weight:500;margin-top:3mm;font-style:italic;
  }
  .tpl-orto .head-sprig{display:block;margin:4mm auto 0;width:24mm;height:11.2mm;color:var(--c-sage)}
  .tpl-orto .meals{margin-top:11mm}
  .tpl-orto .meal-title{
    font-family:'Fraunces',serif;font-weight:500;font-size:23pt;letter-spacing:.01em;
  }
  .tpl-orto .meal-title::after{
    content:"";display:block;width:8mm;height:2px;background:var(--c-ochre);
    margin:3.4mm auto 0;border-radius:2px;
  }
  .tpl-orto .course h3{
    font-family:'Karla',sans-serif;font-size:11pt;font-weight:600;
    text-transform:uppercase;letter-spacing:.28em;color:var(--c-ochre);padding-left:.28em;
  }
  .tpl-orto .course li{font-size:15pt;font-weight:400}
  .tpl-orto .meal-divider{height:2px;background:var(--c-sage);opacity:.2;border-radius:2px;width:42mm}

  /* ---------- Template: Carta (piatti a riga intera, stile Tavola) ---------- */
  .tpl-carta{
    --c-ink:#2a2522;--c-wine:#6e2230;--c-gold:#b48a3c;--c-bg:#faf5ec;--fit:1;
    background:
      radial-gradient(60mm 60mm at 0% 0%,rgba(180,138,60,.06),transparent),
      radial-gradient(60mm 60mm at 100% 100%,rgba(110,34,48,.05),transparent),
      var(--c-bg);
    font-family:'Lora',serif;color:var(--c-ink);
    padding:13mm 16mm;
  }
  .tpl-carta::before{
    content:"";position:absolute;inset:7mm 9mm;border:2.4px double var(--c-wine);
    pointer-events:none;opacity:.7;
  }
  .tpl-carta .hotel{
    font-family:'Playfair Display',serif;font-weight:700;font-size:12pt;
    letter-spacing:.3em;text-transform:uppercase;color:var(--c-wine);padding-left:.3em;
  }
  .tpl-carta .menu-date{
    font-family:'Playfair Display',serif;font-size:31pt;font-weight:700;margin-top:2mm;color:var(--c-ink);
  }
  .tpl-carta .head-flourish{display:block;margin:3.5mm auto 0;width:36mm;height:4.8mm;color:var(--c-gold)}
  .tpl-carta .meals{margin-top:5mm;justify-content:flex-start}
  /* override: stack courses, full-width dish lines */
  .tpl-carta .courses{display:block}
  .tpl-carta .course{max-width:none;flex:none;margin-bottom:calc(5.5mm * var(--fit))}
  .tpl-carta .course:last-child{margin-bottom:0}
  .tpl-carta .meal-title{
    font-family:'Playfair Display',serif;font-weight:700;color:var(--c-wine);
    font-size:calc(23pt * var(--fit));margin:0 0 calc(5mm * var(--fit));
  }
  .tpl-carta .meal-title::before,.tpl-carta .meal-title::after{content:"\2766";color:var(--c-gold);font-size:14pt;margin:0 4mm;vertical-align:middle}
  .tpl-carta .course h3{
    font-family:'Playfair Display',serif;font-size:13pt;font-weight:700;font-style:italic;
    color:var(--c-gold);letter-spacing:.04em;margin:0 0 calc(2.6mm * var(--fit));
  }
  .tpl-carta .course li{font-size:calc(18pt * var(--fit));line-height:1.3;margin:0 0 calc(2.6mm * var(--fit))}
  .tpl-carta .meal-divider{height:1px;background:var(--c-gold);opacity:.5;width:40mm;margin:calc(7mm * var(--fit)) auto}
  .tpl-carta .sheet-foot{
    font-family:'Playfair Display',serif;font-style:italic;font-size:15pt;color:var(--c-wine);
  }
  .tpl-orto .sheet-foot{
    font-family:'Fraunces',serif;font-style:italic;font-size:15pt;color:var(--c-sage);
  }

  /* ---------- topbar / tabs ---------- */
  .topbar{
    height:var(--topbar);display:flex;align-items:center;
    background:var(--ui-panel);border-bottom:1px solid var(--ui-line);
    padding:0 12px;position:sticky;top:0;z-index:20;
  }
  .tabs{display:flex;gap:4px}
  .tab{
    background:none;border:none;color:var(--ui-dim);font:inherit;font-size:13.5px;
    font-weight:600;padding:8px 14px;border-radius:8px;cursor:pointer;
    display:flex;align-items:center;gap:7px;transition:.15s;
  }
  .tab:hover{color:var(--ui-text)}
  .tab.active{background:var(--ui-panel-2);color:var(--ui-text)}
  .tab .count{
    background:var(--ui-accent);color:#1a1406;font-size:11px;font-weight:700;
    border-radius:10px;padding:1px 7px;min-width:18px;text-align:center;
  }
  .tab .count.empty{display:none}

  /* ---------- library ---------- */
  .library{
    height:calc(100vh - var(--topbar));overflow-y:auto;padding:22px 26px 70px;
    background:radial-gradient(120% 80% at 50% 0%,#171a24 0%,#0d0e14 100%);
  }
  .lib-bar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:20px}
  .lib-bar .sel-count{color:var(--ui-dim);font-size:13px;margin-right:auto}
  .lib-bar button{
    border:1px solid var(--ui-line);background:var(--ui-panel-2);color:var(--ui-text);
    font:inherit;font-size:13px;font-weight:600;padding:9px 14px;border-radius:8px;cursor:pointer;transition:.15s;
  }
  .lib-bar button:hover:not(:disabled){border-color:var(--ui-accent-2)}
  .lib-bar button:disabled{opacity:.4;cursor:not-allowed}
  .lib-bar button.primary{background:var(--ui-accent);color:#1a1406;border-color:var(--ui-accent)}
  .lib-bar button.primary:hover:not(:disabled){filter:brightness(1.07)}
  .lib-bar button.danger:hover:not(:disabled){border-color:var(--ui-danger);color:var(--ui-danger)}
  .lib-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:18px}
  .lib-card{
    background:var(--ui-panel);border:1.5px solid var(--ui-line);border-radius:12px;
    overflow:hidden;display:flex;flex-direction:column;transition:.15s;
  }
  .lib-card.sel{border-color:var(--ui-accent);box-shadow:0 0 0 2px rgba(201,161,74,.18)}
  .lib-thumb{aspect-ratio:210/297;background:#fff;position:relative;overflow:hidden;cursor:pointer}
  .lib-thumb .scaler{position:absolute;top:0;left:0;transform-origin:top left}
  .lib-check{
    position:absolute;top:8px;left:8px;width:22px;height:22px;z-index:2;
    accent-color:var(--ui-accent);cursor:pointer;
  }
  .lib-info{padding:10px 12px 6px}
  .lib-info .d{font-weight:600;font-size:13.5px}
  .lib-info .h{color:var(--ui-dim);font-size:12px;margin-top:2px}
  .lib-info .t{color:var(--ui-dim);font-size:10.5px;margin-top:5px;text-transform:uppercase;letter-spacing:.1em}
  .lib-actions{display:flex;gap:8px;padding:8px 12px 12px}
  .lib-actions button{
    flex:1;font:inherit;font-size:12px;font-weight:600;padding:7px;border-radius:7px;
    border:1px solid var(--ui-line);background:var(--ui-panel-2);color:var(--ui-text);cursor:pointer;transition:.15s;
  }
  .lib-actions button:hover{border-color:var(--ui-accent-2)}
  .lib-actions .del:hover{border-color:var(--ui-danger);color:var(--ui-danger)}
  .lib-empty{color:var(--ui-dim);text-align:center;padding:70px 20px;font-size:14px}

  /* ---------- toast ---------- */
  .toast{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--ui-accent);color:#1a1406;padding:10px 18px;border-radius:10px;
    font-weight:600;font-size:13.5px;opacity:0;pointer-events:none;transition:.25s;z-index:50;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* ---------- summary controls ---------- */
  .sum-bar{margin-top:-6px}
  .sum-bar .sum-lab{color:var(--ui-text);font-size:13px;font-weight:600;margin-right:2px}
  .sum-field{color:var(--ui-dim);font-size:12.5px;display:flex;align-items:center;gap:6px}
  .sum-field input{
    background:var(--ui-panel-2);border:1px solid var(--ui-line);color:var(--ui-text);
    border-radius:7px;padding:7px 9px;font:inherit;font-size:12.5px;
  }
  .sum-field input:focus{outline:none;border-color:var(--ui-accent-2)}

  /* ---------- summary sheet ---------- */
  .sheet.summary{
    font-family:'Inter',system-ui,sans-serif;color:#1d1f24;background:#fff;
    padding:11mm 11mm 12mm;
  }
  .summary .sum-head{
    display:flex;align-items:baseline;justify-content:space-between;
    border-bottom:1.5px solid #222;padding-bottom:2.5mm;margin-bottom:5mm;
  }
  .summary .sum-head .t{font-size:13pt;font-weight:700;letter-spacing:.02em}
  .summary .sum-head .r{font-size:10pt;color:#666}
  .summary .sum-grid{
    display:grid;grid-template-columns:1fr 1fr;grid-template-rows:repeat(4,1fr);
    gap:5mm;flex:1;
  }
  .sum-box{
    border:1px solid #c9c9c9;border-radius:4px;padding:3.5mm 4.5mm;overflow:hidden;
    display:flex;flex-direction:column;font-size:9pt;
  }
  .sum-box.empty{border-style:dashed;border-color:#e4e4e4}
  .sum-box .top{display:flex;align-items:baseline;gap:3.5mm;margin-bottom:1.6mm}
  .sum-box .day{font-size:2.3em;font-weight:800;line-height:.85;color:#111}
  .sum-box .lbl{font-size:1.12em;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:#7a1f2b}
  .sum-box .lbl.cena{margin-top:1.8mm}
  .sum-box .dishes{font-size:1em;line-height:1.32;color:#2a2c31}

  #printArea{display:none}

  /* ---------- responsive editor ---------- */
  @media (max-width:820px){
    .app{grid-template-columns:1fr}
    .editor{height:auto;border-right:none;border-bottom:1px solid var(--ui-line)}
    .stage{height:auto}
  }

  /* ---------- PRINT ---------- */
  @media print{
    @page{size:A4;margin:0}
    body{background:#fff}
    .topbar,.editor,.library,.toast,#printArea{display:none !important}
    .app{display:block}
    .stage{padding:0;height:auto;background:#fff;display:block;overflow:visible}
    .stage-inner{transform:none !important}
    .sheet-shadow{box-shadow:none;border-radius:0}
    .sheet{margin:0;min-height:296mm}
  }
</style>
</head>
<body>
<div class="topbar">
  <div class="tabs">
    <button class="tab active" id="tabEditor">Editor</button>
    <button class="tab" id="tabLibrary">Libreria <span class="count empty" id="libCount">0</span></button>
  </div>
</div>

<div class="app view active" id="view-editor">

  <!-- ================= EDITOR ================= -->
  <aside class="editor">
    <div class="brand"><img class="brand-logo" src="logo.png" alt="logo"><h1>Menù del giorno</h1></div>
    <p class="brand-sub">Compila, scegli un template e stampa.</p>

    <div class="field">
      <label for="hotel">Nome struttura</label>
      <input type="text" id="hotel" placeholder="Es. Hotel Riviera" value="Hotel Embassy">
    </div>
    <div class="field">
      <label for="date">Data del menù</label>
      <input type="date" id="date">
    </div>
    <div class="field-row">
      <div class="field">
        <label for="labelPranzo">Etichetta pranzo</label>
        <input type="text" id="labelPranzo" value="Pranzo">
      </div>
      <div class="field">
        <label for="labelCena">Etichetta cena</label>
        <input type="text" id="labelCena" value="Cena">
      </div>
    </div>

    <div class="templates">
      <div class="lbl">Template</div>
      <div class="tpl-grid" id="tplGrid"></div>
    </div>

    <div id="mealsEditor"></div>

    <div class="actions">
      <button class="btn btn-primary" id="saveBtn">Salva in libreria</button>
      <button class="btn btn-ghost" id="printBtn">Stampa</button>
    </div>
    <div class="actions" style="margin-top:8px">
      <button class="btn btn-ghost" id="newBtn">Nuovo menù</button>
    </div>
  </aside>

  <!-- ================= PREVIEW ================= -->
  <main class="stage" id="stage">
    <div class="stage-inner" id="stageInner">
      <div class="sheet-shadow" id="sheetMount"></div>
    </div>
  </main>
</div>

<!-- ================= LIBRARY ================= -->
<section class="library view" id="view-library">
  <div class="lib-bar">
    <span class="sel-count" id="selCount">0 selezionati</span>
    <button id="selAllBtn">Seleziona tutto</button>
    <button id="editSelBtn" disabled>Apri in modifica</button>
    <button id="pdfBtn" class="primary" disabled>Crea PDF</button>
    <button id="delSelBtn" class="danger" disabled>Elimina</button>
  </div>
  <div class="lib-bar sum-bar">
    <span class="sum-lab">Riepilogo</span>
    <label class="sum-field">dal <input type="date" id="sumFrom"></label>
    <label class="sum-field">al <input type="date" id="sumTo"></label>
    <button id="summaryBtn" class="primary">Crea summary</button>
  </div>
  <div class="lib-grid" id="libGrid"></div>
</section>

<div id="printArea"></div>
<div class="toast" id="toast"></div>

<script src="vendor/jspdf.umd.min.js"></script>
<script src="vendor/html2canvas.min.js"></script>
<script>
/* ---------------- config ---------------- */
const LIMITS = { primi:[1,3], secondi:[1,3], dolci:[0,2] };
const COURSE_LABELS = { primi:'Primi', secondi:'Secondi', dolci:'Dolci' };
const TEMPLATES = [
  { id:'marina', name:'Marina' },
  { id:'tavola', name:'Tavola' },
  { id:'orto',   name:'Orto' },
  { id:'carta',  name:'Carta' },
];
let currentTpl = 'marina';

/* start empty: one blank box per course, both meals */
const state = {
  pranzo:{ primi:[''], secondi:[''], dolci:[''] },
  cena:{ primi:[''], secondi:[''], dolci:[''] },
};

/* ---------------- date ---------------- */
const GIORNI = ['Domenica','Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato'];
function pad(n){return String(n).padStart(2,'0')}
function isoToday(){const d=new Date();return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())}
function dateLabel(iso){
  const [y,m,d]=iso.split('-').map(Number);
  const dt=new Date(y,m-1,d);
  return 'Menù '+GIORNI[dt.getDay()]+' '+pad(d)+'/'+pad(m);
}

/* ---------------- editor build ---------------- */
function buildEditor(){
  const root=document.getElementById('mealsEditor');
  root.innerHTML='';
  ['pranzo','cena'].forEach(meal=>{
    const block=document.createElement('div');
    block.className='meal-block';
    block.innerHTML='<h2>'+(meal==='pranzo'?'Pranzo':'Cena')+'</h2>';
    ['primi','secondi','dolci'].forEach(course=>{
      const items=state[meal][course];
      const [min,max]=LIMITS[course];
      const c=document.createElement('div');
      c.className='course';
      const head=document.createElement('div');
      head.className='course-head';
      head.innerHTML='<span class="name">'+COURSE_LABELS[course]+'</span>';
      const add=document.createElement('button');
      add.className='add';add.textContent='+';
      add.disabled=items.length>=max;
      add.onclick=()=>{state[meal][course].push('');buildEditor();render()};
      head.appendChild(add);
      c.appendChild(head);
      items.forEach((val,i)=>{
        const row=document.createElement('div');
        row.className='row';
        const inp=document.createElement('input');
        inp.type='text';inp.value=val;
        inp.placeholder=COURSE_LABELS[course].slice(0,-1).toLowerCase()+' '+(i+1);
        inp.oninput=e=>{state[meal][course][i]=e.target.value;render()};
        const del=document.createElement('button');
        del.className='del';del.textContent='\u00d7';
        del.disabled=items.length<=min;
        del.onclick=()=>{state[meal][course].splice(i,1);buildEditor();render()};
        row.appendChild(inp);row.appendChild(del);
        c.appendChild(row);
      });
      block.appendChild(c);
    });
    root.appendChild(block);
  });
}

/* ---------------- sheet markup ---------------- */
function svgImg(cls,svg){
  return '<img class="'+cls+'" alt="" src="data:image/svg+xml;charset=utf-8,'+encodeURIComponent(svg)+'">';
}
const MOTIFS = {
  marina: svgImg('head-wave','<svg xmlns="http://www.w3.org/2000/svg" width="120" height="12" viewBox="0 0 120 12" fill="none" stroke="#a98549" stroke-width="1.4"><path d="M2 6c8-8 16 8 24 0s16-8 24 0 16 8 24 0 16-8 24 0 16 8 22 0"/></svg>'),
  tavola: svgImg('head-flourish','<svg xmlns="http://www.w3.org/2000/svg" width="120" height="16" viewBox="0 0 120 16" fill="#b48a3c"><path d="M60 2c-4 0-7 3-7 6 0 2 1 4 3 5-6-1-12-3-18-6 5 5 11 8 18 9-7 1-13 4-18 9 6-3 12-5 18-6-2 1-3 3-3 5 0 3 3 6 7 6s7-3 7-6c0-2-1-4-3-5 6 1 12 3 18 6-5-5-11-8-18-9 7-1 13-4 18-9-6 3-12 5-18 6 2-1 3-3 3-5 0-3-3-6-7-6z"/></svg>'),
  orto: svgImg('head-sprig','<svg xmlns="http://www.w3.org/2000/svg" width="60" height="28" viewBox="0 0 60 28" fill="none" stroke="#52613f" stroke-width="1.3" stroke-linecap="round"><path d="M30 26V8"/><path d="M30 12c-5 0-9-3-9-7 4 0 9 2 9 7zM30 12c5 0 9-3 9-7-4 0-9 2-9 7zM30 18c-4 0-7-2-7-5 3 0 7 2 7 5zM30 18c4 0 7-2 7-5-3 0-7 2-7 5z"/><circle cx="30" cy="5" r="2.4" fill="#52613f"/></svg>'),
  carta: svgImg('head-flourish','<svg xmlns="http://www.w3.org/2000/svg" width="120" height="16" viewBox="0 0 120 16" fill="#b48a3c"><path d="M60 2c-4 0-7 3-7 6 0 2 1 4 3 5-6-1-12-3-18-6 5 5 11 8 18 9-7 1-13 4-18 9 6-3 12-5 18-6-2 1-3 3-3 5 0 3 3 6 7 6s7-3 7-6c0-2-1-4-3-5 6 1 12 3 18 6-5-5-11-8-18-9 7-1 13-4 18-9-6 3-12 5-18 6 2-1 3-3 3-5 0-3-3-6-7-6z"/></svg>'),
};

function courseHtml(data,meal,course){
  const items=data[meal][course].map(s=>s.trim()).filter(Boolean);
  if(!items.length) return '';
  return '<div class="course"><h3>'+COURSE_LABELS[course]+'</h3><ul>'+
    items.map(i=>'<li>'+escapeHtml(i)+'</li>').join('')+'</ul></div>';
}
function mealHtml(data,meal,title){
  const body=['primi','secondi','dolci'].map(c=>courseHtml(data,meal,c)).join('');
  return '<section class="meal"><h2 class="meal-title">'+title+'</h2><div class="courses">'+body+'</div></section>';
}
function escapeHtml(s){return s.replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}

function sheetHtml(tpl,menu){
  return '<div class="sheet tpl-'+tpl+'">'
    +'<header class="sheet-head">'
      +'<p class="hotel">'+escapeHtml(menu.hotel||'')+'</p>'
      +'<p class="menu-date">'+dateLabel(menu.date||isoToday())+'</p>'
      +MOTIFS[tpl]
    +'</header>'
    +'<div class="meals">'
      +mealHtml(menu.data,'pranzo',escapeHtml(mlabel(menu,'pranzo')))
      +'<div class="meal-divider"></div>'
      +mealHtml(menu.data,'cena',escapeHtml(mlabel(menu,'cena')))
    +'</div>'
    +'<footer class="sheet-foot">Buon appetito</footer>'
  +'</div>';
}

/* current editor content as a menu object */
function currentMenu(){
  return {
    hotel:document.getElementById('hotel').value||'',
    date:document.getElementById('date').value||isoToday(),
    labels:{
      pranzo:document.getElementById('labelPranzo').value||'Pranzo',
      cena:document.getElementById('labelCena').value||'Cena'
    },
    template:currentTpl,
    data:state
  };
}
function mlabel(menu,meal){
  return (menu.labels&&menu.labels[meal])||(meal==='pranzo'?'Pranzo':'Cena');
}

/* ---------------- render main sheet ---------------- */
function render(){
  document.getElementById('sheetMount').innerHTML=sheetHtml(currentTpl,currentMenu());
  fitCarta();
  fitSheet();
  buildThumbs();
}
function fitCartaEl(sheet){
  if(!sheet) return;
  const mm=96/25.4, limit=295*mm;
  let scale=1, guard=0;
  sheet.style.setProperty('--fit','1');
  const measure=()=>{const old=sheet.style.minHeight;sheet.style.minHeight='0';const h=sheet.offsetHeight;sheet.style.minHeight=old;return h;};
  while(measure()>limit && scale>0.6 && guard<16){
    scale-=0.03;guard++;
    sheet.style.setProperty('--fit',scale.toFixed(2));
  }
}
function fitCarta(){
  fitCartaEl(document.querySelector('#sheetMount .sheet.tpl-carta'));
}
function fitSheet(){
  const stage=document.getElementById('stage');
  const inner=document.getElementById('stageInner');
  const sheet=inner.querySelector('.sheet');
  if(!sheet) return;
  inner.style.transform='none';
  const avail=stage.clientWidth-68;
  const w=sheet.offsetWidth;
  const scale=Math.min(1,avail/w);
  inner.style.transform='scale('+scale+')';
  inner.style.height=(sheet.offsetHeight*scale)+'px';
}

/* ---------------- template thumbnails ---------------- */
function buildThumbs(){
  const grid=document.getElementById('tplGrid');
  grid.innerHTML='';
  TEMPLATES.forEach(t=>{
    const card=document.createElement('div');
    card.className='tpl-card'+(t.id===currentTpl?' active':'');
    card.onclick=()=>{currentTpl=t.id;buildThumbs();render()};
    const thumb=document.createElement('div');
    thumb.className='tpl-thumb';
    const scaler=document.createElement('div');
    scaler.className='scaler';
    scaler.innerHTML=sheetHtml(t.id,currentMenu());
    thumb.appendChild(scaler);
    card.appendChild(thumb);
    const name=document.createElement('div');
    name.className='tname';name.textContent=t.name;
    card.appendChild(name);
    grid.appendChild(card);
    // scale the full sheet down into the thumb
    requestAnimationFrame(()=>{
      const s=thumb.clientWidth/scaler.querySelector('.sheet').offsetWidth;
      scaler.style.transform='scale('+s+')';
    });
  });
}

/* ---------------- library storage ---------------- */
const LIB_KEY='menu-embassy-library';
let currentEditId=null;
let storageOK=true;
function loadLib(){
  try{ return JSON.parse(localStorage.getItem(LIB_KEY))||[]; }catch(e){ return []; }
}
function saveLib(arr){
  try{ localStorage.setItem(LIB_KEY,JSON.stringify(arr)); }
  catch(e){ storageOK=false; toast('Impossibile salvare (memoria del browser non disponibile)'); }
}
function uid(){ return 'm'+Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function emptyData(){
  return { pranzo:{primi:[''],secondi:[''],dolci:['']}, cena:{primi:[''],secondi:[''],dolci:['']} };
}
function clone(o){ return JSON.parse(JSON.stringify(o)); }

function updateBadge(){
  const n=loadLib().length, el=document.getElementById('libCount');
  el.textContent=n; el.classList.toggle('empty',n===0);
}
let toastTimer;
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),1800);
}

function saveCurrent(){
  const m=currentMenu();
  const entry={ id:currentEditId||uid(), hotel:m.hotel, date:m.date, labels:m.labels, template:m.template, data:clone(m.data), savedAt:Date.now() };
  const lib=loadLib();
  const idx=lib.findIndex(x=>x.id===entry.id);
  if(idx>=0) lib[idx]=entry; else lib.push(entry);
  saveLib(lib);
  if(!storageOK) return;
  currentEditId=entry.id;
  updateBadge();
  toast(idx>=0?'Menù aggiornato':'Menù salvato in libreria');
}

function newMenu(){
  currentEditId=null;
  const e=emptyData(); state.pranzo=e.pranzo; state.cena=e.cena;
  document.getElementById('date').value=isoToday();
  document.getElementById('labelPranzo').value='Pranzo';
  document.getElementById('labelCena').value='Cena';
  buildEditor(); render(); showView('editor'); toast('Nuovo menù');
}

function openInEditor(id){
  const m=loadLib().find(x=>x.id===id);
  if(!m) return;
  document.getElementById('hotel').value=m.hotel||'';
  document.getElementById('date').value=m.date||isoToday();
  document.getElementById('labelPranzo').value=(m.labels&&m.labels.pranzo)||'Pranzo';
  document.getElementById('labelCena').value=(m.labels&&m.labels.cena)||'Cena';
  currentTpl=TEMPLATES.some(t=>t.id===m.template)?m.template:'marina';
  const d=clone(m.data); state.pranzo=d.pranzo; state.cena=d.cena;
  currentEditId=id;
  buildEditor(); render(); showView('editor');
}

function deleteMenu(id){
  if(!confirm('Eliminare questo menù dalla libreria?')) return;
  saveLib(loadLib().filter(x=>x.id!==id));
  if(currentEditId===id) currentEditId=null;
  updateBadge(); renderLibrary();
}

/* ---------------- library view ---------------- */
function selectedIds(){
  return [...document.querySelectorAll('#libGrid .lib-check:checked')].map(c=>c.dataset.id);
}
function updateSelBar(){
  const ids=selectedIds(), n=ids.length;
  document.getElementById('selCount').textContent=n+' selezionati';
  document.getElementById('editSelBtn').disabled=(n!==1);
  document.getElementById('delSelBtn').disabled=(n===0);
  const pdf=document.getElementById('pdfBtn');
  pdf.disabled=(n===0); pdf.textContent=n>1?('Crea PDF ('+n+')'):'Crea PDF';
}
function renderLibrary(){
  const grid=document.getElementById('libGrid');
  const lib=loadLib().sort((a,b)=>(b.date||'').localeCompare(a.date||'')||(b.savedAt-a.savedAt));
  grid.innerHTML='';
  if(!lib.length){
    grid.innerHTML='<div class="lib-empty">Nessun menù salvato. Crea un menù nell\u2019Editor e premi \u201cSalva in libreria\u201d.</div>';
    updateSelBar(); return;
  }
  lib.forEach(m=>{
    const card=document.createElement('div'); card.className='lib-card'; card.dataset.id=m.id;
    const thumb=document.createElement('div'); thumb.className='lib-thumb';
    const chk=document.createElement('input'); chk.type='checkbox'; chk.className='lib-check'; chk.dataset.id=m.id;
    chk.addEventListener('change',()=>{card.classList.toggle('sel',chk.checked);updateSelBar();});
    const scaler=document.createElement('div'); scaler.className='scaler'; scaler.innerHTML=sheetHtml(m.template,m);
    thumb.appendChild(chk); thumb.appendChild(scaler);
    thumb.addEventListener('click',e=>{ if(e.target===chk)return; chk.checked=!chk.checked; chk.dispatchEvent(new Event('change')); });
    const info=document.createElement('div'); info.className='lib-info';
    const tname=(TEMPLATES.find(t=>t.id===m.template)||{name:''}).name;
    info.innerHTML='<div class="d">'+dateLabel(m.date)+'</div><div class="h">'+escapeHtml(m.hotel||'')+'</div><div class="t">'+tname+'</div>';
    const acts=document.createElement('div'); acts.className='lib-actions';
    const edit=document.createElement('button'); edit.textContent='Modifica'; edit.onclick=()=>openInEditor(m.id);
    const del=document.createElement('button'); del.className='del'; del.textContent='Elimina'; del.onclick=()=>deleteMenu(m.id);
    acts.appendChild(edit); acts.appendChild(del);
    card.appendChild(thumb); card.appendChild(info); card.appendChild(acts);
    grid.appendChild(card);
    requestAnimationFrame(()=>{
      const sh=scaler.querySelector('.sheet');
      if(m.template==='carta') fitCartaEl(sh);
      const s=thumb.clientWidth/sh.offsetWidth;
      scaler.style.transform='scale('+s+')';
    });
  });
  updateSelBar();
  setSumDefaults();
}

/* ---------------- pdf download ---------------- */
async function createPdf(){
  const ids=selectedIds();
  if(!ids.length) return;
  const lib=loadLib().sort((a,b)=>(b.date||'').localeCompare(a.date||'')||(b.savedAt-a.savedAt));
  const menus=lib.filter(m=>ids.includes(m.id));
  if(!menus.length) return;
  if(!window.jspdf||!window.html2canvas){ toast('Librerie PDF non caricate'); return; }
  const btn=document.getElementById('pdfBtn');
  const old=btn.textContent; btn.disabled=true; btn.textContent='Creazione PDF\u2026';
  try{
    if(document.fonts&&document.fonts.ready) await document.fonts.ready;
    const holder=document.createElement('div');
    holder.style.cssText='position:fixed;left:-10000px;top:0;width:210mm;';
    document.body.appendChild(holder);
    const { jsPDF }=window.jspdf;
    const pdf=new jsPDF({unit:'mm',format:'a4',orientation:'portrait'});
    for(let i=0;i<menus.length;i++){
      holder.innerHTML=sheetHtml(menus[i].template,menus[i]);
      const sheet=holder.querySelector('.sheet');
      if(menus[i].template==='carta') fitCartaEl(sheet);
      await Promise.all([...holder.querySelectorAll('img')].map(im=>im.complete?Promise.resolve():new Promise(r=>{im.onload=im.onerror=r;})));
      const canvas=await html2canvas(sheet,{scale:2,backgroundColor:null,useCORS:true,logging:false});
      const img=canvas.toDataURL('image/png');
      if(i>0) pdf.addPage();
      pdf.addImage(img,'PNG',0,0,210,297,undefined,'FAST');
    }
    document.body.removeChild(holder);
    const name = menus.length===1 ? ('menu-'+(menus[0].date||'menu')+'.pdf') : ('menu-embassy-'+menus.length+'-menu.pdf');
    pdf.save(name);
    toast('PDF scaricato');
  }catch(e){
    console.error(e); toast('Errore nella creazione del PDF');
  }finally{
    btn.disabled=false; btn.textContent=old; updateSelBar();
  }
}

/* ---------------- summary ---------------- */
function dishesFlat(data,meal){
  return ['primi','secondi','dolci'].flatMap(c=>data[meal][c]).map(s=>s.trim()).filter(Boolean).join(' \u00b7 ');
}
function dayNum(iso){ const p=(iso||'').split('-'); return p[2]?String(Number(p[2])):'?'; }
function fmtShort(iso){ const p=(iso||'').split('-'); return p.length===3?(p[2]+'/'+p[1]):iso; }
function sumBoxHtml(m){
  return '<div class="sum-box">'
    +'<div class="top"><span class="day">'+dayNum(m.date)+'</span><span class="lbl">'+escapeHtml(mlabel(m,'pranzo'))+'</span></div>'
    +'<div class="dishes">'+escapeHtml(dishesFlat(m.data,'pranzo'))+'</div>'
    +'<div class="lbl cena">'+escapeHtml(mlabel(m,'cena'))+'</div>'
    +'<div class="dishes">'+escapeHtml(dishesFlat(m.data,'cena'))+'</div>'
  +'</div>';
}
function summaryPageHtml(chunk,rangeLabel){
  let boxes='';
  for(let i=0;i<8;i++) boxes += chunk[i]?sumBoxHtml(chunk[i]):'<div class="sum-box empty"></div>';
  return '<div class="sheet summary">'
    +'<div class="sum-head"><span class="t">Riepilogo menù</span><span class="r">'+rangeLabel+'</span></div>'
    +'<div class="sum-grid">'+boxes+'</div>'
  +'</div>';
}
function fitSumBox(box){
  let fs=9, guard=0; box.style.fontSize=fs+'pt';
  while(box.scrollHeight>box.clientHeight+1 && fs>6 && guard<20){ fs-=0.3; box.style.fontSize=fs.toFixed(1)+'pt'; guard++; }
}
function setSumDefaults(){
  const dates=loadLib().map(m=>m.date).filter(Boolean).sort();
  if(!dates.length) return;
  const f=document.getElementById('sumFrom'), t=document.getElementById('sumTo');
  if(!f.value) f.value=dates[0];
  if(!t.value) t.value=dates[dates.length-1];
}
async function createSummary(){
  let a=document.getElementById('sumFrom').value, b=document.getElementById('sumTo').value;
  if(!a||!b){ toast('Scegli le date del periodo'); return; }
  if(a>b){ const t=a;a=b;b=t; }
  const menus=loadLib().filter(m=>m.date>=a&&m.date<=b).sort((x,y)=>(x.date||'').localeCompare(y.date||''));
  if(!menus.length){ toast('Nessun menù nel periodo scelto'); return; }
  if(!window.jspdf||!window.html2canvas){ toast('Librerie PDF non caricate'); return; }
  const pages=[]; for(let i=0;i<menus.length;i+=8) pages.push(menus.slice(i,i+8));
  const rangeLabel=fmtShort(a)+' \u2013 '+fmtShort(b);
  const btn=document.getElementById('summaryBtn'); const old=btn.textContent; btn.disabled=true; btn.textContent='Creazione\u2026';
  try{
    if(document.fonts&&document.fonts.ready) await document.fonts.ready;
    const holder=document.createElement('div');
    holder.style.cssText='position:fixed;left:-10000px;top:0;width:210mm;';
    document.body.appendChild(holder);
    const { jsPDF }=window.jspdf;
    const pdf=new jsPDF({unit:'mm',format:'a4',orientation:'portrait'});
    for(let p=0;p<pages.length;p++){
      holder.innerHTML=summaryPageHtml(pages[p],rangeLabel);
      holder.querySelectorAll('.sum-box:not(.empty)').forEach(fitSumBox);
      const canvas=await html2canvas(holder.querySelector('.sheet'),{scale:2,backgroundColor:'#ffffff',useCORS:true,logging:false});
      if(p>0) pdf.addPage();
      pdf.addImage(canvas.toDataURL('image/png'),'PNG',0,0,210,297,undefined,'FAST');
    }
    document.body.removeChild(holder);
    pdf.save('riepilogo-'+a+'_'+b+'.pdf');
    toast('Summary scaricato');
  }catch(e){
    console.error(e); toast('Errore nella creazione del summary');
  }finally{
    btn.disabled=false; btn.textContent=old;
  }
}

/* ---------------- tabs ---------------- */
function showView(name){
  const isEd=name==='editor';
  document.getElementById('view-editor').classList.toggle('active',isEd);
  document.getElementById('view-library').classList.toggle('active',!isEd);
  document.getElementById('tabEditor').classList.toggle('active',isEd);
  document.getElementById('tabLibrary').classList.toggle('active',!isEd);
  if(isEd) requestAnimationFrame(fitSheet); else renderLibrary();
}

/* ---------------- wire up ---------------- */
document.getElementById('date').value=isoToday();
document.getElementById('hotel').addEventListener('input',render);
document.getElementById('date').addEventListener('input',render);
document.getElementById('labelPranzo').addEventListener('input',render);
document.getElementById('labelCena').addEventListener('input',render);
document.getElementById('printBtn').addEventListener('click',()=>window.print());
document.getElementById('saveBtn').addEventListener('click',saveCurrent);
document.getElementById('newBtn').addEventListener('click',newMenu);
document.getElementById('tabEditor').addEventListener('click',()=>showView('editor'));
document.getElementById('tabLibrary').addEventListener('click',()=>showView('library'));
document.getElementById('pdfBtn').addEventListener('click',createPdf);
document.getElementById('editSelBtn').addEventListener('click',()=>{const ids=selectedIds();if(ids.length===1)openInEditor(ids[0]);});
document.getElementById('delSelBtn').addEventListener('click',()=>{
  const ids=selectedIds(); if(!ids.length) return;
  if(!confirm('Eliminare i menù selezionati ('+ids.length+')?')) return;
  saveLib(loadLib().filter(x=>!ids.includes(x.id)));
  updateBadge(); renderLibrary();
});
document.getElementById('selAllBtn').addEventListener('click',()=>{
  const boxes=[...document.querySelectorAll('#libGrid .lib-check')];
  const allOn=boxes.length && boxes.every(b=>b.checked);
  boxes.forEach(b=>{ b.checked=!allOn; b.dispatchEvent(new Event('change')); });
});
document.getElementById('summaryBtn').addEventListener('click',createSummary);
window.addEventListener('resize',fitSheet);

updateBadge();
buildEditor();
render();
</script>

if('serviceWorker' in navigator){
